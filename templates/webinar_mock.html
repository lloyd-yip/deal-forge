<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{EVENT_TITLE}}</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#111;color:#fff;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── Top bar ── */
  .topbar{height:52px;background:#1a1a1a;border-bottom:1px solid #2a2a2a;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
  .topbar-left{display:flex;align-items:center;gap:12px}
  .live-badge{background:#e53e3e;color:#fff;font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 8px;border-radius:4px}
  .event-name{font-size:14px;font-weight:500;color:#e2e8f0;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .topbar-right{display:flex;align-items:center;gap:14px;font-size:13px;color:#94a3b8}
  .attendee-count{display:flex;align-items:center;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;background:#48bb78;animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  /* ── Main layout ── */
  .main{display:flex;flex:1;overflow:hidden}

  /* ── Slide panel ── */
  .slide-panel{flex:1;display:flex;flex-direction:column;background:#000;position:relative;overflow:hidden}
  .slide-area{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative}
  .slide{display:none;width:100%;max-width:800px;aspect-ratio:16/9;border-radius:4px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .slide.active{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
  /* Slide 1 — title card */
  .slide-1{background:var(--primary,#0D9488)}
  .slide-1 .slide-logo{font-size:13px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:24px}
  .slide-1 .slide-title{font-size:clamp(18px,3vw,32px);font-weight:800;color:#fff;line-height:1.25;max-width:600px}
  .slide-1 .slide-subtitle{font-size:15px;color:rgba(255,255,255,.75);margin-top:16px}
  .slide-1 .host-bar{position:absolute;bottom:20px;right:24px;display:flex;align-items:center;gap:8px}
  .slide-1 .host-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff}
  .slide-1 .host-label{font-size:12px;color:rgba(255,255,255,.8)}
  /* Slide 2 — agenda */
  .slide-2{background:var(--secondary,#1F2937);flex-direction:column;align-items:flex-start;padding:48px}
  .slide-2 .slide-eyebrow{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--primary,#0D9488);margin-bottom:16px}
  .slide-2 .slide-heading{font-size:clamp(18px,2.5vw,28px);font-weight:700;color:#fff;margin-bottom:28px}
  .slide-2 .bullet-list{list-style:none;display:flex;flex-direction:column;gap:14px;align-items:flex-start;width:100%}
  .slide-2 .bullet-list li{display:flex;align-items:flex-start;gap:12px;font-size:clamp(13px,1.8vw,17px);color:rgba(255,255,255,.85);line-height:1.4}
  .bullet-check{width:22px;height:22px;border-radius:50%;background:var(--primary,#0D9488);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;font-size:11px}

  /* Slide nav */
  .slide-nav{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px}
  .nav-btn{background:rgba(255,255,255,.15);border:none;color:#fff;width:32px;height:32px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
  .nav-btn:hover{background:rgba(255,255,255,.3)}
  .slide-dots{display:flex;gap:6px}
  .slide-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);cursor:pointer;transition:background .15s}
  .slide-dot.active{background:#fff}

  /* ── Chat panel ── */
  .chat-panel{width:240px;background:#1a1a1a;border-left:1px solid #2a2a2a;display:flex;flex-direction:column;flex-shrink:0}
  @media(max-width:640px){.chat-panel{display:none}}
  .chat-header{padding:12px 14px;border-bottom:1px solid #2a2a2a;font-size:13px;font-weight:600;color:#94a3b8;display:flex;align-items:center;justify-content:space-between}
  .chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
  .chat-messages::-webkit-scrollbar{width:4px}
  .chat-messages::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
  .msg{animation:slideIn .3s ease}
  @keyframes slideIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .msg-header{display:flex;align-items:baseline;gap:6px;margin-bottom:2px}
  .msg-sender{font-size:11px;font-weight:700;color:#93c5fd}
  .msg-sender.team{color:#6ee7b7}
  .msg-time{font-size:10px;color:#4b5563}
  .msg-text{font-size:12px;color:#d1d5db;line-height:1.45}
  .msg.team-msg .msg-text{color:#a7f3d0}
  .chat-input-row{padding:10px 12px;border-top:1px solid #2a2a2a;display:flex;gap:8px}
  .chat-input{flex:1;background:#2a2a2a;border:none;border-radius:6px;padding:8px 10px;font-size:12px;color:#d1d5db;outline:none}
  .chat-input::placeholder{color:#4b5563}
  .chat-send{background:var(--primary,#0D9488);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;padding:0 10px;cursor:pointer}
</style>
</head>
<body>
<style>:root{--primary:{{PRIMARY_COLOR}};--secondary:{{SECONDARY_COLOR}}}</style>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="live-badge">● LIVE</div>
    <div class="event-name">{{EVENT_TITLE}}</div>
  </div>
  <div class="topbar-right">
    <div class="attendee-count">
      <span class="dot"></span>
      <span id="attendee-count">{{ATTENDEE_COUNT}}</span> watching
    </div>
    <span>⏱ <span id="timer">00:00</span></span>
  </div>
</div>

<!-- Main -->
<div class="main">
  <!-- Slides -->
  <div class="slide-panel">
    <div class="slide-area">
      <!-- Slide 1: Title -->
      <div class="slide slide-1 active" id="slide-1">
        <div class="slide-logo">{{COMPANY_NAME}}</div>
        <div class="slide-title">{{SLIDE1_TITLE}}</div>
        <div class="slide-subtitle">{{SLIDE1_SUBTITLE}}</div>
        <div class="host-bar">
          <div class="host-avatar" id="host-avatar-1">H</div>
          <span class="host-label">{{HOST_NAME}}</span>
        </div>
      </div>
      <!-- Slide 2: Agenda -->
      <div class="slide slide-2" id="slide-2">
        <div class="slide-eyebrow">Today's Session</div>
        <div class="slide-heading">{{SLIDE2_TITLE}}</div>
        <ul class="bullet-list" id="bullet-list"></ul>
      </div>

      <!-- Nav -->
      <div class="slide-nav">
        <button class="nav-btn" onclick="prevSlide()">‹</button>
        <div class="slide-dots">
          <div class="slide-dot active" onclick="goSlide(1)"></div>
          <div class="slide-dot" onclick="goSlide(2)"></div>
        </div>
        <button class="nav-btn" onclick="nextSlide()">›</button>
      </div>
    </div>
  </div>

  <!-- Chat -->
  <div class="chat-panel">
    <div class="chat-header">
      <span>Live Chat</span>
      <span id="msg-count" style="font-size:11px;color:#4b5563">0 messages</span>
    </div>
    <div class="chat-messages" id="chat-messages"></div>
    <div class="chat-input-row">
      <input class="chat-input" type="text" placeholder="Say something..." disabled>
      <button class="chat-send">→</button>
    </div>
  </div>
</div>

<script>
const messages = {{MESSAGES_JSON}};
const bullets  = {{BULLETS_JSON}};
const hostName = '{{HOST_NAME}}';

// Slide nav
let currentSlide = 1;
function goSlide(n){
  document.getElementById('slide-'+currentSlide).classList.remove('active');
  document.querySelectorAll('.slide-dot')[currentSlide-1].classList.remove('active');
  currentSlide = n;
  document.getElementById('slide-'+n).classList.add('active');
  document.querySelectorAll('.slide-dot')[n-1].classList.add('active');
}
function nextSlide(){goSlide(currentSlide===2?1:2)}
function prevSlide(){goSlide(currentSlide===1?2:1)}

// Bullet list
(function(){
  const ul = document.getElementById('bullet-list');
  (bullets||[]).forEach(b=>{
    const li = document.createElement('li');
    li.innerHTML = `<span class="bullet-check">✓</span><span>${esc(b)}</span>`;
    ul.appendChild(li);
  });
  // Host avatar initial
  const initial = hostName.charAt(0).toUpperCase()||'H';
  document.getElementById('host-avatar-1').textContent = initial;
})();

// Timer
let secs=0;
setInterval(()=>{secs++;const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');document.getElementById('timer').textContent=m+':'+s;},1000);

// Slowly drift attendee count
(function(){
  let count = parseInt('{{ATTENDEE_COUNT}}')||800;
  setInterval(()=>{
    count += Math.floor(Math.random()*3)-1;
    count = Math.max(600,count);
    document.getElementById('attendee-count').textContent = count.toLocaleString();
  }, 8000);
})();

// Chat message replay
(function(){
  if(!messages||!messages.length) return;
  const container = document.getElementById('chat-messages');
  let idx = 0;
  let shown = 0;

  function showNext(){
    if(idx >= messages.length) return;
    const m = messages[idx++];
    shown++;
    const isTeam = m.is_team;
    const div = document.createElement('div');
    div.className = 'msg' + (isTeam?' team-msg':'');
    div.innerHTML = `
      <div class="msg-header">
        <span class="msg-sender${isTeam?' team':''}">${esc(m.sender||'')}</span>
        <span class="msg-time">${esc(m.timestamp||'')}</span>
      </div>
      <div class="msg-text">${esc(m.text||'')}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    document.getElementById('msg-count').textContent = shown+' message'+(shown===1?'':'s');

    // Schedule next message with variable delay (1–5s)
    if(idx < messages.length){
      const delay = 1500 + Math.random()*3500;
      setTimeout(showNext, delay);
    }
  }

  // Start after 2s
  setTimeout(showNext, 2000);
})();

function esc(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
</script>
</body>
</html>
